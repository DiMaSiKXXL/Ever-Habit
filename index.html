  <body>
    <div class="wrapper" data-theme="light">
      <div id="create-habit-modal" class="modal-overlay">
        <form class="create-habit-dialog">
          <input type="text" name="habit-name" id="habit-name" placeholder="Habit name" class="create-habit-dialog__input">
          <input type="text" name="habit-description" id="habit-description" placeholder="Short description" class="create-habit-dialog__input">
          <div class="create-habit-dialog__btn-area">
            <button type="reset" id="cancel-habit-btn" class="btn">Cancel</button>
            <button type="submit" id="submit-habit-btn" class="btn">Create</button>
          </div>
        </form>
      </div>
      <div id="create-habit-confirm-modal" class="modal-overlay">
        <form class="close-habit-dialog">
          <span class="close-habit-dialog__text">Are you sure you want to cancel the habit creation?</span>
          <div class="close-habit-dialog__btn-area">
            <button type="reset" id="confirm-cancel-btn" class="btn">Cancel</button>
            <button type="submit" id="abort-cancel-btn" class="btn">Confirm</button>
          </div>
        </form>
      </div>
      <div id="delete-habit-modal" class="modal-overlay">
        <form class="close-habit-dialog">
          <p class="close-habit-dialog__text">Are you sure you want to permanently remove the habit?</p>
          <p class="close-habit-dialog__text">It will be impossible to cancel this action.</p>
          <div class="close-habit-dialog__btn-area">
            <button type="reset" id="abort-delete-btn" class="btn">Cancel</button>
            <button type="submit" id="confirm-delete-btn" class="btn">Delete</button>
          </div>
        </form>
      </div>
      <div class="_container">
        <header class="header">
          <div class="time">May 21, 2026, Thursday</div>
          <nav class="nav">
            <ul class="nav__menu">
              <li class="nav__item item">
                <button type="button" class="open-create-habit-btn btn tooltip">
                  <svg class="btn__mark">
                    <use href="sprite.svg#plus"></use>
                  </svg>
                  <span class="tooltiptext">Add a habit</span>
                </button>
              </li>
              <li class="nav__item item">
                <button type="button" id="theme-switch" class="theme-btn btn tooltip">
                  <svg class="btn__mark">
                    <use href="sprite.svg#moon"></use>
                  </svg>
                  <span class="tooltiptext">Change theme</span>
                </button>
              </li>
            </ul>
          </nav>
        </header>
      </div>
